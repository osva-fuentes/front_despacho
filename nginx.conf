server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: cualquier ruta que no sea un archivo real
    # se redirige a index.html para que React Router la maneje
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agresivo para assets con hash en el nombre (JS, CSS generados por Vite)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}