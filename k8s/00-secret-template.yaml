# Este archivo es una PLANTILLA. No debe contener valores reales ni
# subirse a GitHub con datos verdaderos. El Secret real se crea en el
# pipeline de GitHub Actions (kubectl create secret) usando GitHub Secrets,
# o manualmente con el comando de abajo.
#
# Ejemplo para crearlo manualmente con kubectl (no aplicar este YAML tal cual):
#
# kubectl create secret generic db-credentials \
#   --from-literal=DB_ENDPOINT=tu-rds-endpoint.rds.amazonaws.com \
#   --from-literal=DB_PORT=3306 \
#   --from-literal=DB_NAME=itpcargo_db \
#   --from-literal=DB_USERNAME=admin \
#   --from-literal=DB_PASSWORD=tu-password-segura
#
# Estructura de referencia (no usar valores de ejemplo):
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
type: Opaque
stringData:
  DB_ENDPOINT: REEMPLAZAR
  DB_PORT: "3306"
  DB_NAME: REEMPLAZAR
  DB_USERNAME: REEMPLAZAR
  DB_PASSWORD: REEMPLAZAR
